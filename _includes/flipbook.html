<div class="flipbook-wrapper">

{% if include.title %}
<div class="flipbook-header">
    <h2>{{ include.title }}</h2>
    <button class="flipbook-fullscreen" type="button" title="Plein écran">⛶</button>
</div>
{% endif %}

<div class="flipbook-book"></div>

<div class="flipbook-toolbar">
    <button class="flipbook-first" type="button" title="Première page">|◀</button>
    <button class="flipbook-prev" type="button" title="Page précédente">◀</button>
    <button class="flipbook-next" type="button" title="Page suivante">▶</button>
    <button class="flipbook-last" type="button" title="Dernière page">▶|</button>
</div>

</div>

<style>

.flipbook-wrapper {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    margin: 2rem auto 4rem auto;
}

.flipbook-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.flipbook-header h2 {
    margin: 0;
}

.flipbook-fullscreen {
    cursor: pointer;
    border: none;
    background: transparent;
    font-size: 1.3rem;
    line-height: 1;
}

.flipbook-book {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
    min-height: 150px;
}

.flipbook-toolbar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: .5rem;
}

.flipbook-toolbar button {
    cursor: pointer;
    min-width: 2.4rem;
    padding: .45rem .70rem;
}

.flipbook-wrapper:fullscreen {
    display: flex;
    flex-direction: column;
    margin: 0;
    padding: 1rem;
    box-sizing: border-box;
    background: #2b2b2b;
}

.flipbook-wrapper:fullscreen .flipbook-book {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.flipbook-wrapper:fullscreen .flipbook-toolbar {
    flex: 0 0 auto;
}

.page {
    background: white;
    padding: 10px;
    margin: 20px auto;
    box-shadow: 0 0 8px rgba(0,0,0,.25);
}

</style>

<script type="module">

document.addEventListener("DOMContentLoaded", async () => {

    const wrapper = document.querySelector(".flipbook-wrapper");
    const container = wrapper.querySelector(".flipbook-book");

    const pdfUrl = "{{ page.asset_path }}/{{ include.file }}";

    const scale = {{ include.scale | default: 1.5 }};
    const forcedWidth = "{{ include.width | default: '' }}";

    const pdf = await window.pdfjsLib.getDocument({ url: pdfUrl }).promise;

    const pages = [];
    let referenceWidth = 0;
    let referenceHeight = 0;

    async function rendrePage(numero) {

        const pdfPage = await pdf.getPage(numero);
        const viewport = pdfPage.getViewport({ scale });

        if (numero === 1) {
            referenceWidth = viewport.width + 20;
            referenceHeight = viewport.height + 20;
        }

        const page = document.createElement("div");
        page.className = "page";

        page.style.width = forcedWidth ? forcedWidth : viewport.width + "px";

        const canevas = document.createElement("canvas");
        canevas.width = viewport.width;
        canevas.height = viewport.height;

        page.appendChild(canevas);
        pages.push(page);

        const contexte = canevas.getContext("2d");

        await pdfPage.render({
            canvasContext: contexte,
            viewport: viewport
        }).promise;
    }

    for (let n = 1; n <= pdf.numPages; n++) {
        await rendrePage(n);
    }

    const pageFlip = new St.PageFlip(container, {
        width: referenceWidth,
        height: referenceHeight,
        showCover: true,
        size: "stretch",
        maxShadowOpacity: 0.5
    });

    pageFlip.loadFromHTML(pages);

    wrapper.querySelector(".flipbook-first").onclick = () => pageFlip.turnToPage(0);
    wrapper.querySelector(".flipbook-prev").onclick = () => pageFlip.flipPrev();
    wrapper.querySelector(".flipbook-next").onclick = () => pageFlip.flipNext();
    wrapper.querySelector(".flipbook-last").onclick = () => pageFlip.turnToPage(pageFlip.getPageCount() - 1);

    const boutonPleinEcran = wrapper.querySelector(".flipbook-fullscreen");

    if (boutonPleinEcran) {
        boutonPleinEcran.onclick = async () => {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await wrapper.requestFullscreen();
                }
            } catch (e) {
                console.error(e);
            }
        };
    }

    document.addEventListener("fullscreenchange", () => {
        if (document.fullscreenElement && document.fullscreenElement !== wrapper) {
            return;
        }
        requestAnimationFrame(() => {
            pageFlip.update();
            pageFlip.updateOrientation();
        });
    });

});

</script>
