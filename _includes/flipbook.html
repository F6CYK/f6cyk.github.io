<div class="flipbook-wrapper">

{% if include.title %}
<div class="flipbook-header">
    <h2>{{ include.title }}</h2>

    <button
        id="fullscreen-btn"
        type="button"
        title="Plein écran">
        ⛶
    </button>
</div>
{% endif %}

<div id="pdf-book"></div>

</div>

<style>

.flipbook-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
}

#fullscreen-btn{
    cursor:pointer;
    border:none;
    background:transparent;
    font-size:1.3rem;
    line-height:1;
}

/* Mode plein écran */

.flipbook-wrapper:fullscreen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    width:100vw;
    height:100vh;

    margin:0;
    padding:0;

    background:#444;
    overflow:hidden;
}

.flipbook-wrapper:fullscreen #pdf-book{
    display:flex;
    justify-content:center;
    align-items:center;

    width:100%;
    height:100%;
}

</style>

<script type="module">

document.addEventListener("DOMContentLoaded", async () => {

    const url = "{{ page.asset_path }}/{{ include.file }}";

    const loadingTask = window.pdfjsLib.getDocument({ url });
    const pdf = await loadingTask.promise;

    const container = document.getElementById("pdf-book");
    const wrapper = document.querySelector(".flipbook-wrapper");
    const fullscreenBtn = document.getElementById("fullscreen-btn");

    let pageWidth = 0;
    let pageHeight = 0;

    for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber++) {

        const page = await pdf.getPage(pageNumber);

        const scale = {{ include.scale | default: 1.5 }};

        const viewport = page.getViewport({ scale });

        if (pageNumber === 1) {
            pageWidth = viewport.width + 20;
            pageHeight = viewport.height + 20;
        }

        const pageDiv = document.createElement("div");
        pageDiv.className = "page";

        pageDiv.style.background = "white";
        pageDiv.style.padding = "10px";
        pageDiv.style.margin = "20px auto";
        pageDiv.style.boxShadow = "0 0 8px rgba(0,0,0,.25)";
        pageDiv.style.width =
            "{{ include.width | default: '' }}" || (viewport.width + "px");

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        pageDiv.appendChild(canvas);
        container.appendChild(pageDiv);

        await page.render({
            canvasContext: context,
            viewport: viewport
        }).promise;
    }

    const pageFlip = new St.PageFlip(container, {
        width: pageWidth,
        height: pageHeight,
        showCover: true,
        size: "stretch",
        maxShadowOpacity: 0.5
    });

    pageFlip.loadFromHTML(
        container.querySelectorAll(".page")
    );

    if (fullscreenBtn) {

        fullscreenBtn.addEventListener("click", async () => {

            try {

                if (!document.fullscreenElement) {

                    await wrapper.requestFullscreen();

                } else {

                    await document.exitFullscreen();

                }

            } catch (err) {

                console.error(err);

            }

        });

    }

    document.addEventListener("fullscreenchange", () => {

        setTimeout(() => {

            window.dispatchEvent(new Event("resize"));

        }, 200);

    });

});

</script>
