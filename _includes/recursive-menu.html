{% for noeud in include.noeuds %}

<li{% if noeud.enfants %} class="menu-deroulant"{% endif %}>

    {% if noeud.url %}
        <a href="{{ noeud.url | relative_url }}">
            {{ noeud.titre }}
        </a>
    {% else %}
        <a href="#" tabindex="0">
            {{ noeud.titre }}
        </a>
    {% endif %}

    {% if noeud.enfants %}
        <ul class="sous-menu">
            {% include recursive-menu.html noeuds=noeud.enfants %}
        </ul>
    {% endif %}

</li>

{% endfor %}
