<a class="pdf-card"
   href="{{ page.asset_path }}/{{ include.file }}"
   target="_blank">

    <div class="pdf-cover">
        <img
            src="{{ page.asset_path }}/{{ include.cover }}"
            alt="{{ include.title | default: include.file }}">
    </div>

    <div class="pdf-title">
        {{ include.title | default: include.file }}
    </div>

</a>

<style>
.pdf-card{
    display:inline-block;
    width:220px;
    text-align:center;
    text-decoration:none;
    color:inherit;
    perspective:1000px;
    margin:1em;
}

.pdf-cover{
    transition:transform .35s ease, box-shadow .35s ease;
    transform-origin:left center;
    border:1px solid #bbb;
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.25);
    background:white;
}

.pdf-card:hover .pdf-cover{
    transform:rotateY(-18deg);
    box-shadow:12px 12px 20px rgba(0,0,0,.35);
}

.pdf-cover img{
    display:block;
    width:100%;
    height:auto;
}

.pdf-title{
    margin-top:.6em;
    font-size:.9em;
    font-weight:bold;
}
</style>
